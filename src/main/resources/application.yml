server:
  port: 8090
  tomcat:
    threads:
      max: 400
      min-spare: 20
  error:
    include-message: always

spring:
  application:
    name: fun-ai-claw-plane

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  docker:
    enabled: ${DOCKER_RUNTIME_ENABLED:true}
    command: ${DOCKER_CMD:docker}
    container-prefix: ${DOCKER_CONTAINER_PREFIX:funclaw}
    restart-policy: ${DOCKER_RESTART_POLICY:unless-stopped}
    gateway-host-port: ${DOCKER_GATEWAY_HOST_PORT:42617}
    gateway-container-port: ${DOCKER_GATEWAY_CONTAINER_PORT:42617}
    gateway-host: ${DOCKER_GATEWAY_HOST:0.0.0.0}
    ui-path-routing-enabled: true
    gateway-base-path-template: /fun-claw/ui-controller/{instanceId}
    gateway-public-url-template: http://8.152.159.249/fun-claw/ui-controller/{instanceId}
    gateway-config-dir-template: /data/zeroclaw
    gateway-base-path-option: --base-path
    gateway-public-url-option: --public-url
    gateway-config-dir-option: --config-dir
    require-pairing: ${DOCKER_REQUIRE_PAIRING:false}
    gateway-require-pairing-option: --require-pairing
    allow-public-bind: ${DOCKER_ALLOW_PUBLIC_BIND:true}
    gateway-ready-timeout-seconds: ${DOCKER_GATEWAY_READY_TIMEOUT_SECONDS:30}
    gateway-ready-probe-interval-millis: ${DOCKER_GATEWAY_READY_PROBE_INTERVAL_MILLIS:500}
    gateway-ready-host: ${DOCKER_GATEWAY_READY_HOST:127.0.0.1}
    gateway-ready-path: ${DOCKER_GATEWAY_READY_PATH:/health}
    agent-workspace-mount-enabled: true
    agent-workspace-host-path-template: /opt/agents/agent-mgc-novel-script
    agent-workspace-container-path-template: /workspace/agent-mgc-novel-script
    agent-workspace-mount-read-only: true
    instance-skills-mount-enabled: true
    instance-skills-host-path-template: /data/funai/fun-ai-claw/instance-skills/{instanceId}
    instance-skills-container-path: /workspace/open-skills/skills
    instance-skills-mount-read-only: true
    skill-packages-root-path: ${DOCKER_SKILL_PACKAGES_ROOT_PATH:/opt/fun-ai-claw/skills}
    workspace-agents-auto-sync-enabled: true
    workspace-agents-file-path: /zeroclaw-data/workspace/AGENTS.md
    runtime-config-policy-enabled: ${DOCKER_RUNTIME_CONFIG_POLICY_ENABLED:false}
    runtime-config-gateway-section-enabled: ${DOCKER_RUNTIME_CONFIG_GATEWAY_SECTION_ENABLED:true}
    runtime-config-model-route-section-enabled: ${DOCKER_RUNTIME_CONFIG_MODEL_ROUTE_SECTION_ENABLED:false}
    runtime-config-query-classification-rule-section-enabled: ${DOCKER_RUNTIME_CONFIG_QUERY_CLASSIFICATION_RULE_SECTION_ENABLED:false}
    gateway-section-fragment-path: classpath:zeroclaw-fragments/gateway.toml
    model-route-section-fragment-path: classpath:zeroclaw-fragments/model-route.toml
    query-classification-rule-section-fragment-path: classpath:zeroclaw-fragments/query-classification-rule.toml
    delegate-agent-profile-id: ${DOCKER_DELEGATE_AGENT_PROFILE_ID:mgc-novel-to-script}
    delegate-agent-provider-override: ${DOCKER_DELEGATE_AGENT_PROVIDER_OVERRIDE:}
    delegate-agent-model-override: ${DOCKER_DELEGATE_AGENT_MODEL_OVERRIDE:}
    delegate-agent-temperature-override: ${DOCKER_DELEGATE_AGENT_TEMPERATURE_OVERRIDE:}
    api-key: ${ZEROCLAW_API_KEY:}
    stop-timeout-seconds: ${DOCKER_STOP_TIMEOUT_SECONDS:20}
    command-timeout-seconds: ${DOCKER_COMMAND_TIMEOUT_SECONDS:120}
  pairing-code:
    fixed-code: ""
    fixed-link-path: /
    gateway-probe-scheme: http
    gateway-probe-host: ""
    gateway-config-path: ""
    auto-auth-query-param: autoAuth
    auth-token-query-param: authToken
    auth-probe-timeout-seconds: 5
  agent-session:
    docker-command: ${AGENT_SESSION_DOCKER_COMMAND:${DOCKER_CMD:docker}}
    container-prefix: ${AGENT_SESSION_CONTAINER_PREFIX:${DOCKER_CONTAINER_PREFIX:funclaw}}
    command: ${AGENT_SESSION_COMMAND:zeroclaw agent --config-dir /data/zeroclaw}
    lang: ${AGENT_SESSION_LANG:C.UTF-8}
    lc-all: ${AGENT_SESSION_LC_ALL:C.UTF-8}
    rust-log: ${AGENT_SESSION_RUST_LOG:info}
    process-shutdown-timeout-seconds: ${AGENT_SESSION_PROCESS_SHUTDOWN_TIMEOUT_SECONDS:4}
  terminal:
    docker-command: ${TERMINAL_DOCKER_COMMAND:${DOCKER_CMD:docker}}
    container-prefix: ${TERMINAL_CONTAINER_PREFIX:${DOCKER_CONTAINER_PREFIX:funclaw}}
    shell: ${TERMINAL_SHELL:/bin/busybox sh}
    process-shutdown-timeout-seconds: ${TERMINAL_PROCESS_SHUTDOWN_TIMEOUT_SECONDS:2}
