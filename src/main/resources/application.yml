server:
  port: 8090

spring:
  application:
    name: fun-ai-claw-plane
  datasource:
    url: "jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:5432}/fun_ai_claw"
    username: "${DB_USER:funai_agent}"
    password: "${DB_PASSWORD:Ss123456!}"
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 10000

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  docker:
    enabled: ${DOCKER_RUNTIME_ENABLED:true}
    command: ${DOCKER_CMD:docker}
    container-prefix: ${DOCKER_CONTAINER_PREFIX:funclaw}
    restart-policy: ${DOCKER_RESTART_POLICY:unless-stopped}
    gateway-host-port: ${DOCKER_GATEWAY_HOST_PORT:42617}
    gateway-container-port: ${DOCKER_GATEWAY_CONTAINER_PORT:42617}
    gateway-host: ${DOCKER_GATEWAY_HOST:0.0.0.0}
    ui-path-routing-enabled: true
    gateway-base-path-template: /fun-claw/ui-controller/{instanceId}
    gateway-public-url-template: http://8.152.159.249/fun-claw/ui-controller/{instanceId}
    gateway-config-dir-template: /data/zeroclaw
    gateway-base-path-option: --base-path
    gateway-public-url-option: --public-url
    gateway-config-dir-option: --config-dir
    require-pairing: ${DOCKER_REQUIRE_PAIRING:false}
    gateway-require-pairing-option: --require-pairing
    allow-public-bind: ${DOCKER_ALLOW_PUBLIC_BIND:true}
    gateway-ready-timeout-seconds: ${DOCKER_GATEWAY_READY_TIMEOUT_SECONDS:30}
    gateway-ready-probe-interval-millis: ${DOCKER_GATEWAY_READY_PROBE_INTERVAL_MILLIS:500}
    gateway-ready-host: ${DOCKER_GATEWAY_READY_HOST:127.0.0.1}
    gateway-ready-path: ${DOCKER_GATEWAY_READY_PATH:/health}
    agent-workspace-mount-enabled: true
    agent-workspace-host-path-template: /opt/agents/agent-mgc-novel-script
    agent-workspace-container-path-template: /workspace/agent-mgc-novel-script
    agent-workspace-mount-read-only: true
    workspace-agents-auto-sync-enabled: true
    workspace-agents-file-path: /zeroclaw-data/workspace/AGENTS.md
    delegate-agent-profile-enabled: ${DOCKER_DELEGATE_AGENT_PROFILE_ENABLED:true}
    delegate-agent-profile-id: ${DOCKER_DELEGATE_AGENT_PROFILE_ID:mgc-novel-to-script}
    delegate-agent-manifest-relative-path: zeroclaw-agent.manifest.json
    delegate-agent-provider-override: ${DOCKER_DELEGATE_AGENT_PROVIDER_OVERRIDE:}
    delegate-agent-model-override: ${DOCKER_DELEGATE_AGENT_MODEL_OVERRIDE:}
    delegate-agent-temperature-override: ${DOCKER_DELEGATE_AGENT_TEMPERATURE_OVERRIDE:}
    api-key: ${ZEROCLAW_API_KEY:}
    stop-timeout-seconds: ${DOCKER_STOP_TIMEOUT_SECONDS:20}
    command-timeout-seconds: ${DOCKER_COMMAND_TIMEOUT_SECONDS:120}
